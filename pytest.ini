[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --cov=nifty_quant_lab
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-fail-under=60
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning:yfinance
markers =
    unit: fast unit tests (no network/DB)
    integration: requires live DB/network
    slow: slow tests (full scan, data download)
