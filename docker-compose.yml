version: "3.9"

# ============================================================
# NIFTY Quant Lab — Docker Compose (Development Stack)
# ============================================================
# Services:
#   postgres   — Primary database (PostgreSQL 16)
#   redis      — Cache + pub/sub
#   api        — FastAPI application server
#   dashboard  — Streamlit dashboard
#   pgadmin    — DB management UI (optional)
#
# Usage:
#   docker compose up -d postgres redis    # infra only
#   docker compose up -d                   # full stack
#   docker compose logs -f api             # follow API logs
# ============================================================

services:

  # ── PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: nql_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nifty_quant_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nql_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nifty_quant_lab"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nql_net

  # ── Redis 7
  redis:
    image: redis:7-alpine
    container_name: nql_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - nql_net

  # ── FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: nql_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      API_RELOAD: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./nifty_quant_lab:/app/nifty_quant_lab:ro
      - ./reports/output:/app/reports/output
      - ./logs:/app/logs
    networks:
      - nql_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: nql_dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./nifty_quant_lab:/app/nifty_quant_lab:ro
    networks:
      - nql_net

  # ── pgAdmin (optional DB management — comment out in production)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nql_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@intellisapphire.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - nql_net
    profiles:
      - dev    # only starts with: docker compose --profile dev up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  nql_net:
    driver: bridge
